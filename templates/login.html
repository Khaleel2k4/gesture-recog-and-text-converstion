<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SignSpeak AI - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
  </head>
  <body>
    <div class="stage">
      <div class="card">
        <div class="brand">
          <div class="logo" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M7 12.5V6.75C7 6.05964 7.55964 5.5 8.25 5.5C8.94036 5.5 9.5 6.05964 9.5 6.75V12.5" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
              <path d="M9.5 12.5V5.75C9.5 5.05964 10.0596 4.5 10.75 4.5C11.4404 4.5 12 5.05964 12 5.75V12.5" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
              <path d="M12 12.5V6.25C12 5.55964 12.5596 5 13.25 5C13.9404 5 14.5 5.55964 14.5 6.25V13" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
              <path d="M14.5 13V7.25C14.5 6.55964 15.0596 6 15.75 6C16.4404 6 17 6.55964 17 7.25V14.25" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
              <path d="M7 12.5V14.2C7 17.2 8.8 19.5 12 19.5H13.2C15.4 19.5 17.2 17.9 17.5 15.8L18.2 11.3C18.28 10.76 17.92 10.26 17.39 10.17C16.94 10.1 16.51 10.35 16.35 10.78L15.8 12.25" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <h1>SignSpeak AI</h1>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="post" action="{{ url_for('login') }}">
          <div class="field">
            <input type="text" name="username" placeholder="Username" autocomplete="username" />
            <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M20 21a8 8 0 0 0-16 0" stroke="white" stroke-opacity="0.9" stroke-width="1.6" stroke-linecap="round"/>
              <path d="M12 13a5 5 0 1 0 0-10 5 5 0 0 0 0 10Z" stroke="white" stroke-opacity="0.9" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
          </div>

          <div class="field">
            <input type="password" name="password" placeholder="Password" autocomplete="current-password" />
            <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M7 10V8a5 5 0 0 1 10 0v2" stroke="white" stroke-opacity="0.9" stroke-width="1.6" stroke-linecap="round"/>
              <path d="M6.5 10h11A2.5 2.5 0 0 1 20 12.5v6A2.5 2.5 0 0 1 17.5 21h-11A2.5 2.5 0 0 1 4 18.5v-6A2.5 2.5 0 0 1 6.5 10Z" stroke="white" stroke-opacity="0.9" stroke-width="1.6" stroke-linejoin="round"/>
              <path d="M12 14.2v2.8" stroke="white" stroke-opacity="0.9" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
          </div>

          <button class="btn" type="submit">Log in to SignSpeak</button>
        </form>

        
      </div>
    </div>
    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
  </body>
</html>
