<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SignSpeak AI - History</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/history.css') }}">
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <div class="logo" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M7 12.5V6.75C7 6.05964 7.55964 5.5 8.25 5.5C8.94036 5.5 9.5 6.05964 9.5 6.75V12.5" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
              <path d="M9.5 12.5V5.75C9.5 5.05964 10.0596 4.5 10.75 4.5C11.4404 4.5 12 5.05964 12 5.75V12.5" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
              <path d="M12 12.5V6.25C12 5.55964 12.5596 5 13.25 5C13.9404 5 14.5 5.55964 14.5 6.25V13" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
              <path d="M14.5 13V7.25C14.5 6.55964 15.0596 6 15.75 6C16.4404 6 17 6.55964 17 7.25V14.25" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
              <path d="M7 12.5V14.2C7 17.2 8.8 19.5 12 19.5H13.2C15.4 19.5 17.2 17.9 17.5 15.8L18.2 11.3C18.28 10.76 17.92 10.26 17.39 10.17C16.94 10.1 16.51 10.35 16.35 10.78L15.8 12.25" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <h1>SignSpeak AI</h1>
        </div>

        <nav class="nav">
          <a href="{{ url_for('dashboard') }}" class="nav-item">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M9 22V12h6v10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Dashboard
          </a>
          <a href="{{ url_for('realtime') }}" class="nav-item">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Real-Time
          </a>
          <a href="{{ url_for('history') }}" class="nav-item active">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 8v4l3 3m6-3a9 9 0 1 1-18 0 9 9 0 0 1 18 0z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            History
          </a>
          <a href="{{ url_for('analytics') }}" class="nav-item">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M18 20V10M12 20V4M6 20v-6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Analytics
          </a>
          <a href="{{ url_for('settings') }}" class="nav-item">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 0 0 2.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 0 0 1.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 0 0-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 0 0-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 0 0-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 0 0-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 0 0 1.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Settings
          </a>
        </nav>
        
        <div class="sidebar-bottom">
          <div class="sidebar-user">
            <div class="user-avatar">{{ session.username[0]|upper }}</div>
            <div class="user-info">
              <div class="user-name">{{ session.username }}</div>
              <div class="user-role">Premium</div>
            </div>
          </div>
        </div>
      </aside>

      <main class="main history-main">
        <div class="history-header">
          <h2>History</h2>
        </div>

        <div class="filters">
          <input type="date" id="start-date" class="date-input" value="2024-04-22">
          <input type="date" id="end-date" class="date-input" value="2024-04-23">
          <select id="gesture-filter" class="select-input">
            <option value="all">All Gestures</option>
            <option value="hello">HELLO</option>
            <option value="thankyou">THANK YOU</option>
            <option value="yes">YES</option>
            <option value="no">NO</option>
            <option value="yellow">YELLOW</option>
            <option value="number">NUMBER</option>
          </select>
          <button id="apply-filters" class="btn-apply">Apply Filters</button>
        </div>

        <div class="table-container">
          <table class="history-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Time</th>
                <th>Detected Gesture</th>
                <th>Detail</th>
              </tr>
            </thead>
            <tbody id="history-tbody">
              <!-- Rows will be populated by JS -->
            </tbody>
          </table>
        </div>

        <div class="pagination">
          <span id="pagination-info">1 - 12 of 42</span>
          <div class="pagination-controls">
            <button id="prev-page" class="btn-page">Previous</button>
            <button id="next-page" class="btn-page">Next</button>
          </div>
        </div>
      </main>
    </div>
    <script src="{{ url_for('static', filename='js/history.js') }}"></script>
  </body>
</html>
